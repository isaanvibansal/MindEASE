<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Journal | MINDEASE</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<form action="/save_journal" method="POST">
    <div class="journal-wrapper">
        <div class="notebook">
            <div class="page left-page">
                <h2>My Thoughts ✍️</h2>
                <textarea name="leftText" placeholder="Start writing here..."></textarea>
            </div>

            <div class="spine"></div>

            <div class="page right-page">
                <h2>Reflections 🌿</h2>
                <textarea name="rightText" placeholder="What did you learn today?"></textarea>
            </div>
        </div>

        <div class="journal-actions">
            <button type="submit" class="save-btn">Save Entry</button>
            <a href="/dashboard" class="back-btn">Back</a>
        </div>
    </div>
</form>

</body>
</html>
